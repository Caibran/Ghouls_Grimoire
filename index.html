<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Ghoul's Grimoire — development blog for EO community projects.">
  <title>Ghoul's Grimoire</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div id="wrapper">

  <div id="header">
    <span id="site-title"><a href="index.html">Ghoul's Grimoire</a></span>
    <div id="site-tagline">Development Blog &mdash; EO Community Projects</div>
  </div>

  <nav id="nav" role="navigation" aria-label="Main navigation">
    <div id="nav-inner">
      <div class="nav-item"><a href="index.html" class="nav-link">Home</a></div>
      <div class="nav-item">
        <a href="projects/index.html" class="nav-link" data-section="projects">Projects <span class="caret">&#9660;</span></a>
        <div class="nav-dropdown" id="nav-projects-dropdown">
          <!-- populated by JS from projects-data.js -->
        </div>
      </div>
      <div class="nav-item"><a href="about.html"     class="nav-link">About Me</a></div>
      <div class="nav-item"><a href="resources.html" class="nav-link">Resources</a></div>
      <button id="nav-hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div id="mobile-menu" role="dialog" aria-label="Navigation">
    <a href="index.html">Home</a>
    <div class="mobile-section-label">Projects</div>
    <div id="mobile-projects-links">
      <!-- populated by JS -->
    </div>
    <a href="about.html">About Me</a>
    <a href="resources.html">Resources</a>
  </div>

  <div id="main">
    <div class="panel">
      <div class="panel-header">Latest Posts</div>
      <div id="latest-post-wrap"></div>
      <div id="accordion-wrap"></div>
    </div>
  </div>

  <div id="footer">
    <span>&copy; 2026 Ghoul's Grimoire &mdash; <a href="admin/index.html" style="color:var(--border)">Admin</a></span>
    <nav class="footer-links">
      <a href="projects/index.html">Projects</a>
      <a href="about.html">About</a>
      <a href="resources.html">Resources</a>
    </nav>
  </div>

</div>
<script src="js/markdown.js"></script>
<script src="js/posts.js"></script>
<script src="js/nav.js"></script>
<script src="js/api.js"></script>
<script>
function renderHome() {
  var projects = window.PROJECTS || [];
  var posts    = window.POSTS    || [];

  var dd = document.getElementById('nav-projects-dropdown');
  var ml = document.getElementById('mobile-projects-links');
  if (dd) dd.innerHTML = projects.map(function(p){
    return '<a href="projects/' + p.slug + '.html">' + p.label + '</a>';
  }).join('');
  if (ml) ml.innerHTML = projects.map(function(p){
    return '<a href="projects/' + p.slug + '.html" class="indent">' + p.label + '</a>';
  }).join('');

  if (!posts.length) {
    document.getElementById('latest-post-wrap').innerHTML =
      '<div class="empty-state"><p>No posts yet. Check back soon.</p></div>';
    return;
  }

  /* Fetch full content for top post, then render */
  var top = posts[0];
  fetch('/api/posts/' + top.project + '/' + top.filename)
    .then(function(r){ return r.json(); })
    .then(function(data){
      top.md = data.content || '';
      document.getElementById('latest-post-wrap').innerHTML = window.renderFullPost(top);
      var next = posts.slice(1, 4);
      if (next.length) {
        /* Fetch content for accordion posts */
        Promise.all(next.map(function(p){
          return fetch('/api/posts/' + p.project + '/' + p.filename)
            .then(function(r){ return r.json(); })
            .then(function(d){ p.md = d.content || ''; return p; });
        })).then(function(loaded){
          document.getElementById('accordion-wrap').innerHTML = window.renderAccordion(loaded);
          if (window.initAccordions) window.initAccordions();
        });
      }
    })
    .catch(function(){
      document.getElementById('latest-post-wrap').innerHTML = window.renderFullPost(top);
    });
}

document.addEventListener('grimoire:ready', renderHome);
</script>
</body>
</html>

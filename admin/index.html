<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Admin - Ghoul's Grimoire</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap');
:root{
  --bg:#0a0a0a;--surface:#141414;--panel:#1a1a1a;--border:#2e2e2e;--blo:#222;
  --text:#d0d0d0;--dim:#777;--head:#f0f0f0;--link:#7aadca;
  --green:#4caf78;--red:#c0392b;--amber:#c8932a;
  --r:3px;--fp:'Press Start 2P',monospace;--fb:'Inter',Arial,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:13px;line-height:1.5;display:flex;flex-direction:column}
button{cursor:pointer;font-family:var(--fb);font-size:13px}
input,textarea,select{font-family:var(--fb);font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#2e2e2e;border-radius:3px}
*{scrollbar-width:thin;scrollbar-color:#2e2e2e var(--bg)}

/* Password screen */
#pw{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px}
#pw h1{font-family:var(--fp);font-size:10px;color:var(--head);letter-spacing:2px;text-align:center}
#pw p{font-size:12px;color:var(--dim)}
#pw-form{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
#pw-in{background:var(--surface);border:1px solid var(--border);color:var(--head);padding:10px 14px;border-radius:var(--r);font-size:14px;width:100%;outline:none;transition:border-color .2s}
#pw-in:focus{border-color:#555}
#pw-go{padding:10px;font-weight:600;background:var(--surface);border:1px solid #4c7a4c;color:var(--green);border-radius:var(--r);transition:background .12s}
#pw-go:hover{background:#1c3a1c}
#pw-err{font-size:11px;color:var(--red);text-align:center;min-height:16px}

/* Shell */
#shell{display:none;flex-direction:column;height:100vh}

/* Topbar */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:48px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#tb-title{font-family:var(--fp);font-size:7px;color:var(--head);letter-spacing:1px;white-space:nowrap}
#tb-status{font-size:11px;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tbtn{padding:5px 10px;background:var(--panel);border:1px solid var(--border);color:var(--dim);border-radius:var(--r);font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}
.tbtn:hover{background:#2a2a2a;color:var(--head)}
.tbtn.g{border-color:#4c7a4c;color:var(--green)}
.tbtn.g:hover{background:#1c3a1c}
.tbtn.r{border-color:#7a2c2c;color:var(--red)}
.tbtn.r:hover{background:#2a0c0c}

/* Layout */
#layout{display:grid;grid-template-columns:230px 1fr 320px;flex:1;overflow:hidden;height:calc(100vh - 48px)}
.col{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.col:last-child{border-right:none}
.col-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;font-family:var(--fp);font-size:6px;color:var(--dim);letter-spacing:2px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.col-hdr button{font-size:11px;font-weight:700;color:var(--dim);background:none;border:1px solid var(--border);border-radius:var(--r);padding:2px 8px}
.col-hdr button:hover{background:var(--panel);color:var(--head)}
.col-body{flex:1;overflow-y:auto}

/* Post list */
.frow{display:flex;border-bottom:1px solid var(--border)}
.frow select{flex:1;background:var(--surface);border:none;color:var(--text);padding:8px 10px;font-size:11px;appearance:none;cursor:pointer}
.pi{padding:11px 14px;border-bottom:1px solid var(--blo);cursor:pointer;transition:background .1s;user-select:none}
.pi:hover{background:var(--surface)}
.pi.on{background:var(--panel);border-left:2px solid var(--link);padding-left:12px}
.pit{font-size:12px;font-weight:600;color:var(--head);margin-bottom:3px;line-height:1.3}
.pim{font-size:10px;color:var(--dim);display:flex;gap:8px;flex-wrap:wrap}
.tag{background:var(--surface);border:1px solid var(--border);border-radius:1px;padding:1px 5px;font-size:9px;text-transform:uppercase;letter-spacing:.4px}

/* Editor */
#ed-body{padding:14px;display:flex;flex-direction:column;gap:11px}
.fl{display:flex;flex-direction:column;gap:4px}
.fl label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px}
.fi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--head);padding:7px 10px;font-size:13px;transition:border-color .15s;width:100%}
.fi:focus{outline:none;border-color:#555}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#ed-md{min-height:240px;resize:vertical;font-family:'Courier New',monospace;font-size:12px;line-height:1.7;color:#c8c8c8}
.tip{font-size:10px;color:var(--dim);line-height:1.6}
.tip code{background:var(--surface);border:1px solid var(--blo);padding:1px 4px;border-radius:2px;font-size:10px;color:#aaddcc}
.eacts{display:flex;gap:8px;flex-wrap:wrap;padding-top:8px;border-top:1px solid var(--border)}
.eb{padding:7px 14px;font-size:12px;font-weight:600;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--dim)}
.eb:hover{background:var(--panel);color:var(--head)}
.eb.sv{border-color:#4c7a4c;color:var(--green)}
.eb.sv:hover{background:#1c3a1c}
.eb.dl{border-color:#7a2c2c;color:var(--red);margin-left:auto}
.eb.dl:hover{background:#2a0c0c}
#ed-ph{padding:40px 20px;text-align:center;color:var(--dim)}
#ed-ph h3{font-size:13px;color:var(--text);margin-bottom:6px}

/* Preview */
#prev-body{padding:18px;font-size:13.5px;line-height:1.8;color:var(--text)}
#prev-body h1{font-size:18px;font-weight:700;color:var(--head);margin-bottom:12px}
#prev-body h2{font-size:14px;font-weight:700;color:var(--head);margin:18px 0 8px;border-bottom:1px solid var(--border);padding-bottom:5px}
#prev-body h3{font-size:13px;font-weight:700;color:var(--head);margin:14px 0 6px}
#prev-body p{margin-bottom:12px}
#prev-body code{font-family:'Courier New',monospace;font-size:11.5px;background:var(--surface);border:1px solid var(--blo);padding:1px 5px;border-radius:2px;color:#aaddcc}
#prev-body pre{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:14px 0;overflow-x:auto}
#prev-body pre code{background:none;border:none;padding:0;color:#c8c8c8}
#prev-body strong{color:var(--head);font-weight:700}
#prev-body ul,#prev-body ol{margin:8px 0 8px 20px}
#prev-body li{margin-bottom:4px}
#prev-body blockquote{border-left:3px solid var(--border);padding:8px 14px;color:var(--dim);margin:12px 0;font-style:italic}
#prev-body hr{border:none;border-top:1px solid var(--border);margin:16px 0}
#prev-body img{max-width:100%;border-radius:var(--r);margin:8px 0}
.pm-meta{padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid var(--border)}
.pm-tag{display:inline-block;font-size:9px;font-weight:700;border:1px solid var(--border);background:var(--surface);padding:2px 7px;border-radius:2px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:8px}
.pm-meta h1{font-size:18px;font-weight:700;color:var(--head);margin-bottom:4px}
.pm-date{font-size:11px;color:var(--dim)}

/* Project modal */
#pm-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:center;justify-content:center}
#pm-ov.open{display:flex}
#pm-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);width:96%;max-width:600px;max-height:88vh;display:flex;flex-direction:column}
#pm-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
#pm-hdr h2{font-size:9px;font-weight:700;color:var(--head);font-family:var(--fp);letter-spacing:1px}
#pm-hdr button{background:none;border:none;color:var(--dim);font-size:20px;line-height:1;padding:2px 6px}
#pm-tabs{display:flex;border-bottom:1px solid var(--border)}
.ptab{flex:1;padding:9px;background:var(--panel);border:none;border-right:1px solid var(--border);font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.4px}
.ptab:last-child{border-right:none}
.ptab.on{background:var(--surface);color:var(--head)}
#pm-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.pit2{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 13px;display:flex;align-items:center;gap:10px}
.pit2-info{flex:1;min-width:0}
.pit2-slug{font-size:10px;color:var(--dim);font-family:'Courier New',monospace}
.pit2-name{font-size:13px;font-weight:600;color:var(--head)}
.pit2-btns{display:flex;gap:6px;flex-shrink:0}
.pit2-btns button{background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--dim);padding:4px 9px;font-size:11px}
.pit2-btns .be:hover{background:var(--panel);color:var(--head)}
.pit2-btns .bd:hover{background:#2a0c0c;color:var(--red);border-color:#7a2c2c}
.pf-acts{display:flex;gap:8px;flex-wrap:wrap}
.pf-acts button{padding:7px 14px;font-size:12px;font-weight:600;border-radius:var(--r)}
.bsp{background:var(--surface);border:1px solid #4c7a4c;color:var(--green)}
.bsp:hover{background:#1c3a1c}
.bcp{background:var(--surface);border:1px solid var(--border);color:var(--dim)}
.bcp:hover{background:var(--panel);color:var(--head)}

/* Save dialog */
#sdlg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9996;align-items:center;justify-content:center;padding:20px}
#sdlg.open{display:flex}
#sdlg-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);max-width:720px;width:100%;max-height:84vh;display:flex;flex-direction:column}
#sdlg-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
#sdlg-hdr span{font-size:11px;font-weight:700;color:var(--head)}
#sdlg-hdr button{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer}
#sdlg-ta{flex:1;background:var(--surface);border:none;color:#c8c8c8;font-family:'Courier New',monospace;font-size:11px;padding:14px;resize:none;min-height:220px;outline:none}
#sdlg-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
#sdlg-copy{padding:7px 16px;font-size:12px;font-weight:600;background:var(--surface);border:1px solid #4c7a4c;color:var(--green);border-radius:var(--r);cursor:pointer}
#sdlg-hint{font-size:11px;color:var(--dim)}

/* Toast */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:9px 18px;font-size:12px;color:var(--dim);z-index:9997;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{color:var(--green);border-color:#4c7a4c}
#toast.err{color:var(--red);border-color:#7a2c2c}
#toast.warn{color:var(--amber);border-color:#7a5c2c}
.empty{padding:40px 20px;text-align:center;color:var(--dim);font-size:12px}
.empty h3{font-size:13px;color:var(--text);margin-bottom:6px}

/* Mobile tabs */
#mob-tabs{display:none}
@media(max-width:820px){
  #layout{grid-template-columns:1fr;height:calc(100vh - 98px)}
  .col{display:none}
  .col.act{display:flex}
  #mob-tabs{display:flex;border-top:1px solid var(--border);background:var(--surface);height:50px;position:fixed;bottom:0;left:0;right:0;z-index:100}
  .mt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--dim);border:none;background:none;border-right:1px solid var(--border)}
  .mt:last-child{border-right:none}
  .mt.on{color:var(--head);background:var(--panel)}
  .mt svg{width:17px;height:17px;fill:currentColor}
  #ed-md{min-height:140px}
}
@media(min-width:821px){.col{display:flex !important}}
</style>
</head>
<body>

<!-- PASSWORD -->
<div id="pw">
  <h1>Grimoire Admin</h1>
  <p>Enter your password to continue.</p>
  <div id="pw-form">
    <input type="password" id="pw-in" placeholder="Password" autocomplete="current-password">
    <button id="pw-go" type="button">Enter</button>
    <div id="pw-err"></div>
  </div>
</div>

<!-- SHELL (hidden until authed) -->
<div id="shell">

  <div id="topbar">
    <span id="tb-title">Grimoire Admin</span>
    <span id="tb-status">Loading...</span>
    <button class="tbtn g" id="btn-proj" type="button">Projects</button>
    <a href="../index.html" class="tbtn" target="_blank">View Site</a>
    <button class="tbtn r" id="btn-logout" type="button" style="margin-left:auto">Log Out</button>
  </div>

  <div id="layout">

    <!-- Col 1: List -->
    <div class="col act" id="col-list">
      <div class="col-hdr">Posts <button id="btn-new" type="button">+ New</button></div>
      <div class="col-body" id="post-list"></div>
    </div>

    <!-- Col 2: Editor -->
    <div class="col" id="col-ed">
      <div class="col-hdr">Editor</div>
      <div class="col-body">
        <div id="ed-ph"><h3>Select a Post</h3><p>Pick from the list or tap + New.</p></div>
        <div id="ed-form" style="display:none">
          <div id="ed-body">
            <div class="fl"><label>Title</label><input class="fi" id="ed-title" type="text" placeholder="Post title..."></div>
            <div class="fgrid">
              <div class="fl"><label>Date</label><input class="fi" id="ed-date" type="date"></div>
              <div class="fl"><label>Project</label><select class="fi" id="ed-proj"></select></div>
            </div>
            <div class="fl"><label>Tags <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:9px">(comma-separated)</span></label><input class="fi" id="ed-tags" type="text" placeholder="java, engine"></div>
            <div class="fl">
              <label>Content (Markdown)</label>
              <textarea class="fi" id="ed-md" rows="14" placeholder="Write in Markdown..."></textarea>
              <div class="tip">Embed image: <code>![caption](../assets/images/photo.jpg)</code></div>
            </div>
            <div class="eacts">
              <button class="eb sv" id="btn-save" type="button">Save Post</button>
              <button class="eb" id="btn-prev-tab" type="button">Preview</button>
              <button class="eb dl" id="btn-del" type="button">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Col 3: Preview -->
    <div class="col" id="col-prev">
      <div class="col-hdr">Preview</div>
      <div class="col-body"><div id="prev-body"><div class="empty"><h3>Preview</h3><p>Edit a post to see it here.</p></div></div></div>
    </div>

  </div><!-- /layout -->

  <div id="mob-tabs">
    <button class="mt on" data-col="col-list" type="button">
      <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>Posts
    </button>
    <button class="mt" data-col="col-ed" type="button">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>Editor
    </button>
    <button class="mt" data-col="col-prev" type="button">
      <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>Preview
    </button>
  </div>

</div><!-- /shell -->

<!-- PROJECT MODAL -->
<div id="pm-ov">
  <div id="pm-box">
    <div id="pm-hdr"><h2>Manage Projects</h2><button id="btn-pm-close" type="button">&times;</button></div>
    <div id="pm-tabs">
      <button class="ptab on" data-ptab="list" type="button">Projects</button>
      <button class="ptab" data-ptab="add" type="button">Add / Edit</button>
    </div>
    <div id="pm-body"></div>
  </div>
</div>

<!-- SAVE DIALOG -->
<div id="sdlg">
  <div id="sdlg-box">
    <div id="sdlg-hdr">
      <span id="sdlg-label">Copy content</span>
      <button id="sdlg-x" type="button">&times;</button>
    </div>
    <textarea id="sdlg-ta" readonly></textarea>
    <div id="sdlg-foot">
      <button id="sdlg-copy" type="button">Copy to Clipboard</button>
      <span id="sdlg-hint"></span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function() {
'use strict';

/* ============================================================
   GRIMOIRE ADMIN -- self-contained, zero external dependencies
   All state stored in localStorage.
   ============================================================ */

var PW       = 'ghoul1234';
var PW_KEY   = 'ga_auth';
var DATA_KEY = 'ga_data';

/* ---- Minimal Markdown renderer ----------------------------- */
function md2html(src) {
  if (!src) return '';
  var cb = [], ic = [];
  var s = src.replace(/```([\w]*)\r?\n([\s\S]*?)```/g, function(_, lang, code) {
    cb.push({lang: lang, code: code}); return '\x00CB' + (cb.length-1) + '\x00';
  });
  s = s.replace(/`([^`\r\n]+)`/g, function(_, c) {
    ic.push(esc(c)); return '\x00IC' + (ic.length-1) + '\x00';
  });
  var lines = s.split(/\r?\n/), out = [], i = 0;
  while (i < lines.length) {
    var r = lines[i];
    if (r.trim() === '') { out.push(''); i++; continue; }
    if (/^\x00CB\d+\x00$/.test(r.trim())) { out.push(r.trim()); i++; continue; }
    var hm = r.match(/^(#{1,6})\s+(.+)$/);
    if (hm) { out.push('<h'+hm[1].length+'>'+inl(hm[2],ic)+'</h'+hm[1].length+'>'); i++; continue; }
    if (/^---+$/.test(r.trim())) { out.push('<hr>'); i++; continue; }
    if (/^> /.test(r)) {
      var bq = [];
      while (i < lines.length && /^> /.test(lines[i])) { bq.push(inl(lines[i].slice(2),ic)); i++; }
      out.push('<blockquote>'+bq.join('<br>')+'</blockquote>'); continue;
    }
    if (/^[-*] /.test(r)) {
      var ul = [];
      while (i < lines.length && /^[-*] /.test(lines[i])) { ul.push('<li>'+inl(lines[i].replace(/^[-*] /,''),ic)+'</li>'); i++; }
      out.push('<ul>'+ul.join('')+'</ul>'); continue;
    }
    if (/^\d+\. /.test(r)) {
      var ol = [];
      while (i < lines.length && /^\d+\. /.test(lines[i])) { ol.push('<li>'+inl(lines[i].replace(/^\d+\.\s+/,''),ic)+'</li>'); i++; }
      out.push('<ol>'+ol.join('')+'</ol>'); continue;
    }
    var para = [];
    while (i < lines.length && lines[i].trim() !== '' && !/^#/.test(lines[i]) && !/^[-*] /.test(lines[i]) && !/^\d+\. /.test(lines[i]) && !/^> /.test(lines[i]) && !/^---+$/.test(lines[i].trim()) && !/^\x00CB/.test(lines[i].trim())) {
      para.push(inl(lines[i],ic)); i++;
    }
    if (para.length) out.push('<p>'+para.join('\n')+'</p>');
  }
  var h = out.join('\n');
  h = h.replace(/\x00CB(\d+)\x00/g, function(_,n) { var c=cb[+n]; return '<pre><code class="lang-'+(c.lang||'text')+'">'+esc(c.code)+'</code></pre>'; });
  h = h.replace(/\x00IC(\d+)\x00/g, function(_,n) { return '<code>'+ic[+n]+'</code>'; });
  return h;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inl(s, ic) {
  if (ic) s = s.replace(/\x00IC(\d+)\x00/g, function(_,n) { return '<code>'+ic[+n]+'</code>'; });
  return s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/_(.+?)_/g,'<em>$1</em>').replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>');
}

/* ---- Helpers ----------------------------------------------- */
function g(id) { return document.getElementById(id); }
function eh(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() { return new Date().toISOString().slice(0,10); }
function uid() { return 'p' + Date.now() + Math.random().toString(36).slice(2,6); }
function slug(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''); }
function fname(title, date) {
  var d = (date||today()).replace(/-/g,'');
  var t = slug(title||'post').slice(0,50);
  return d + '-' + t + '.md';
}

var _tt;
function toast(msg, type) {
  var t = g('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' '+type : '');
  clearTimeout(_tt);
  _tt = setTimeout(function() { t.className=''; }, 3200);
}
function setStatus(msg) { g('tb-status').textContent = msg; }

/* ---- Auth -------------------------------------------------- */
function isAuth() { return sessionStorage.getItem(PW_KEY) === '1'; }
function setAuth() { sessionStorage.setItem(PW_KEY, '1'); }
function clearAuth() { sessionStorage.removeItem(PW_KEY); }

/* ---- Data: load from localStorage, seed from inline data --- */

var SEED_PROJECTS = [
  {slug:'shards-of-eternity',label:'Shards of Eternity',desc:'placeholder',status:'In Progress',lang:'C++',type:'EO Server',github:'#'},
  {slug:'eoengine',label:'EOEngine',desc:'placeholder',status:'Active',lang:'C / C++',type:'Library',github:'#'},
  {slug:'eocobra',label:'EOCobra',desc:'placeholder',status:'In Progress',lang:'C++ / Lua',type:'EO Client',github:'#'},
  {slug:'eojava',label:'EOJava',desc:'placeholder',status:'Active',lang:'Java',type:'EO Client',github:'#'},
  {slug:'gearfall-online',label:'Gearfall Online',desc:'placeholder',status:'Planning',lang:'C++ / EOEngine',type:'MMORPG',github:'#'}
];

var SEED_POSTS = [
  {id:'1',filename:'001-character-animation.md',project:'eojava',projectLabel:'EOJava',title:'placeholder',date:'2026-04-22',tags:['placeholder'],body:'placeholder'},
  {id:'2',filename:'002-libgdx-setup.md',project:'eojava',projectLabel:'EOJava',title:'placeholder',date:'2026-04-22',tags:['placeholder'],body:'placeholder'},
  {id:'3',filename:'003-login-screen.md',project:'eojava',projectLabel:'EOJava',title:'placeholder',date:'2026-04-22',tags:['placeholder'],body:'placeholder'},
  {id:'4',filename:'001-overview.md',project:'shards-of-eternity',projectLabel:'Shards of Eternity',title:'placeholder',date:'2026-04-22',tags:['placeholder'],body:'placeholder'},
  {id:'5',filename:'001-world-design.md',project:'gearfall-online',projectLabel:'Gearfall Online',title:'placeholder',date:'2026-04-22',tags:['placeholder'],body:'placeholder'},
  {id:'6',filename:'001-architecture.md',project:'eoengine',projectLabel:'EOEngine',title:'placeholder',date:'2026-04-22',tags:['placeholder'],body:'placeholder'},
  {id:'7',filename:'001-revisited.md',project:'eocobra',projectLabel:'EOCobra',title:'placeholder',date:'2026-04-22',tags:['placeholder'],body:'placeholder'}
];

var state = { projects: [], posts: [] };

function loadState() {
  try {
    var raw = localStorage.getItem(DATA_KEY);
    if (raw) {
      state = JSON.parse(raw);
      if (!Array.isArray(state.projects)) state.projects = SEED_PROJECTS.slice();
      if (!Array.isArray(state.posts)) state.posts = SEED_POSTS.slice();
    } else {
      state = { projects: SEED_PROJECTS.slice(), posts: SEED_POSTS.slice() };
    }
  } catch(e) {
    state = { projects: SEED_PROJECTS.slice(), posts: SEED_POSTS.slice() };
  }
}

function saveState() {
  try { localStorage.setItem(DATA_KEY, JSON.stringify(state)); } catch(e) {}
}

/* ---- Posts-data.js builder --------------------------------- */
function buildPostsDataJS() {
  var sorted = state.posts.slice().sort(function(a,b) { return new Date(b.date) - new Date(a.date); });
  var arr = sorted.map(function(p, i) {
    return {
      id: i+1,
      path: (p.project||'misc') + '/' + (p.filename||fname(p.title,p.date)),
      project: p.project||'',
      projectLabel: p.projectLabel||'',
      title: p.title||'',
      date: p.date||'',
      tags: p.tags||[],
      md: p.body||''
    };
  });
  return '// AUTO-GENERATED by Grimoire Admin -- ' + new Date().toISOString() + '\n' +
         'window.POSTS_DATA = ' + JSON.stringify(arr, null, 2) + ';\n';
}

function buildProjectsDataJS() {
  return '// AUTO-GENERATED by Grimoire Admin -- ' + new Date().toISOString() + '\n' +
         'window.PROJECTS = ' + JSON.stringify(state.projects, null, 2) + ';\n';
}

/* ---- Save dialog ------------------------------------------- */
function showSave(content, filename) {
  g('sdlg-ta').value = content;
  g('sdlg-label').textContent = 'Copy -> paste into: js/' + filename;
  g('sdlg-hint').textContent = 'Save file, then git add -A && git commit -m "update" && git push';
  g('sdlg').classList.add('open');
}

/* ---- Trigger file download --------------------------------- */
function download(content, filename) {
  var blob = new Blob([content], {type:'text/plain'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

/* ---- Persist to js/ files ---------------------------------- */
function persistData() {
  var postsJS = buildPostsDataJS();
  var projsJS = buildProjectsDataJS();
  // Try File System Access API first
  if (window.showSaveFilePicker) {
    // Skip -- user needs to use download buttons or copy dialog
  }
  // Download both files
  download(postsJS, 'posts-data.js');
  download(projsJS, 'projects-data.js');
  toast('Downloaded posts-data.js + projects-data.js -- replace files in js/ then push', 'warn');
}

/* ---- Render project dropdown ------------------------------- */
function renderProjSelect() {
  var sel = g('ed-proj');
  if (!sel) return;
  var cur = sel.value;
  sel.innerHTML = state.projects.map(function(p) {
    return '<option value="'+eh(p.slug)+'">'+eh(p.label)+'</option>';
  }).join('');
  if (cur) sel.value = cur;
}

/* ---- Current post ------------------------------------------ */
var cur = null;
var prevTimer = null;

function openPost(p) {
  cur = p;
  g('ed-ph').style.display = 'none';
  g('ed-form').style.display = '';
  g('ed-title').value = p.title || '';
  g('ed-date').value  = p.date  || today();
  g('ed-proj').value  = p.project || (state.projects[0]||{}).slug || '';
  if (!g('ed-proj').value && state.projects.length) g('ed-proj').value = state.projects[0].slug;
  g('ed-tags').value  = (p.tags||[]).join(', ');
  g('ed-md').value    = p.body  || '';
  updatePreview();
  renderList();
}

function newPost() {
  var defProj = state.projects[0] || {slug:'', label:''};
  var p = {id: uid(), filename: null, project: defProj.slug, projectLabel: defProj.label, title:'', date: today(), tags:[], body:''};
  state.posts.unshift(p);
  renderProjSelect();
  openPost(p);
  renderList();
  // Switch to editor on mobile
  switchTab('col-ed');
  setStatus(state.posts.length + ' posts');
}

function updatePreview() {
  clearTimeout(prevTimer);
  prevTimer = setTimeout(function() {
    var slug2 = g('ed-proj') ? g('ed-proj').value : '';
    var proj = state.projects.find(function(p) { return p.slug === slug2; });
    var label = proj ? proj.label : slug2;
    var dateVal = g('ed-date') ? g('ed-date').value : '';
    var dateStr = dateVal ? new Date(dateVal + 'T00:00:00').toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : '';
    var title = g('ed-title') ? g('ed-title').value : '';
    var body  = g('ed-md')    ? g('ed-md').value    : '';
    g('prev-body').innerHTML =
      '<div class="pm-meta">'+
        '<span class="pm-tag">'+eh(label)+'</span>'+
        '<h1>'+(title?eh(title):'Untitled')+'</h1>'+
        '<span class="pm-date">'+eh(dateStr)+'</span>'+
      '</div>' + md2html(body);
  }, 220);
}

function savePost() {
  if (!cur) { toast('No post open','err'); return; }
  var title = (g('ed-title').value||'').trim();
  if (!title) { toast('Title is required','err'); return; }
  var projSlug = g('ed-proj').value || '';
  if (!projSlug) { toast('Select a project first','err'); return; }
  var proj = state.projects.find(function(p) { return p.slug === projSlug; });
  var projLabel = proj ? proj.label : projSlug;
  var filename = cur.filename || fname(title, g('ed-date').value);
  Object.assign(cur, {
    title:        title,
    date:         g('ed-date').value,
    project:      projSlug,
    projectLabel: projLabel,
    tags:         (g('ed-tags').value||'').split(',').map(function(t){return t.trim();}).filter(Boolean),
    body:         g('ed-md').value,
    filename:     filename
  });
  // Update in state array
  var idx = state.posts.findIndex(function(p) { return p.id === cur.id; });
  if (idx === -1) state.posts.push(cur); else state.posts[idx] = cur;
  saveState();
  renderList();
  toast('Saved to browser storage', 'ok');
  setStatus(state.posts.length + ' posts -- saved ' + new Date().toLocaleTimeString());
}

function deletePost() {
  if (!cur) { toast('No post selected','err'); return; }
  if (!confirm('Delete "'+cur.title+'"?')) return;
  state.posts = state.posts.filter(function(p) { return p.id !== cur.id; });
  saveState();
  cur = null;
  g('ed-form').style.display = 'none';
  g('ed-ph').style.display = '';
  g('prev-body').innerHTML = '<div class="empty"><h3>Preview</h3><p>Select a post.</p></div>';
  renderList();
  toast('Post deleted', 'ok');
  setStatus(state.posts.length + ' posts');
}

/* ---- Render post list -------------------------------------- */
var listFilter = '';
function renderList() {
  var pl = g('post-list');
  if (!pl) return;
  var filtered = listFilter ? state.posts.filter(function(p){return p.project===listFilter;}) : state.posts;
  var sorted = filtered.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  var opts = '<option value="">All Projects</option>' +
    state.projects.map(function(p){return '<option value="'+eh(p.slug)+'">'+eh(p.label)+'</option>';}).join('');
  pl.innerHTML =
    '<div class="frow"><select id="list-filter">'+opts+'</select></div>' +
    (sorted.length ? sorted.map(function(p){
      var on = cur && cur.id === p.id ? ' on' : '';
      return '<div class="pi'+on+'" data-id="'+eh(p.id)+'">'+
        '<div class="pit">'+(p.title||'(untitled)')+'</div>'+
        '<div class="pim">'+
          '<span class="tag">'+(p.projectLabel||p.project||'-')+'</span>'+
          '<span>'+p.date+'</span>'+
        '</div>'+
      '</div>';
    }).join('') : '<div class="empty"><h3>No Posts</h3><p>Tap + New to create one.</p></div>');
  var lf = g('list-filter');
  if (lf) {
    if (listFilter) lf.value = listFilter;
    lf.addEventListener('change', function() { listFilter = lf.value; renderList(); });
  }
  pl.querySelectorAll('.pi').forEach(function(item) {
    item.addEventListener('click', function() {
      var p = state.posts.find(function(x){return x.id === item.dataset.id;});
      if (p) { openPost(p); switchTab('col-ed'); }
    });
  });
}

/* ---- Mobile tab switch ------------------------------------ */
function switchTab(colId) {
  if (window.innerWidth > 820) return;
  document.querySelectorAll('.col').forEach(function(c){c.classList.remove('act');});
  document.querySelectorAll('.mt').forEach(function(b){b.classList.remove('on');});
  var col = g(colId);
  if (col) col.classList.add('act');
  var btn = document.querySelector('[data-col="'+colId+'"]');
  if (btn) btn.classList.add('on');
}

/* ---- Project modal ---------------------------------------- */
var pmTab = 'list';
var editingSlug = null;

function renderPM() {
  var body = g('pm-body');
  if (!body) return;
  if (pmTab === 'list') {
    body.innerHTML = state.projects.length ? state.projects.map(function(p){
      return '<div class="pit2">'+
        '<div class="pit2-info">'+
          '<div class="pit2-slug">'+eh(p.slug)+'</div>'+
          '<div class="pit2-name">'+eh(p.label)+' <span style="font-size:10px;color:var(--dim);font-weight:400">- '+eh(p.status||'')+'</span></div>'+
        '</div>'+
        '<div class="pit2-btns">'+
          '<button class="be" data-slug="'+eh(p.slug)+'" type="button">Edit</button>'+
          '<button class="bd" data-slug="'+eh(p.slug)+'" type="button">Remove</button>'+
        '</div>'+
      '</div>';
    }).join('') : '<div class="empty"><h3>No Projects</h3><p>Use Add/Edit tab.</p></div>';
    body.querySelectorAll('.be').forEach(function(btn){
      btn.addEventListener('click', function(){ editingSlug=btn.dataset.slug; switchPMTab('add'); });
    });
    body.querySelectorAll('.bd').forEach(function(btn){
      btn.addEventListener('click', function(){
        var sl = btn.dataset.slug;
        if (!confirm('Remove project "'+sl+'"?')) return;
        state.projects = state.projects.filter(function(p){return p.slug!==sl;});
        saveState(); renderProjSelect(); renderPM();
        toast('Removed: '+sl, 'ok');
      });
    });
  } else {
    var ed = editingSlug ? state.projects.find(function(p){return p.slug===editingSlug;}) : null;
    var v = function(f){ return ed ? eh(ed[f]||'') : ''; };
    body.innerHTML =
      '<div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;">'+(ed?'Editing: '+eh(ed.label):'New Project')+'</div>'+
      '<div class="fgrid">'+
        '<div class="fl"><label>Slug</label><input class="fi" id="np-slug" value="'+v('slug')+'" placeholder="my-project" style="font-family:monospace'+(ed?';opacity:.5':'')+'" '+(ed?'readonly':'')+' type="text"></div>'+
        '<div class="fl"><label>Display Name</label><input class="fi" id="np-label" value="'+v('label')+'" placeholder="My Project" type="text"></div>'+
      '</div>'+
      '<div class="fgrid">'+
        '<div class="fl"><label>Type</label><input class="fi" id="np-type" value="'+v('type')+'" placeholder="EO Client..." type="text"></div>'+
        '<div class="fl"><label>Language</label><input class="fi" id="np-lang" value="'+v('lang')+'" placeholder="Java..." type="text"></div>'+
      '</div>'+
      '<div class="fgrid">'+
        '<div class="fl"><label>Status</label>'+
          '<select class="fi" id="np-status">'+
            ['Active','In Progress','Planning','On Hold','Archived'].map(function(s){return '<option'+(v('status')===s?' selected':'')+'>'+s+'</option>';}).join('')+
          '</select>'+
        '</div>'+
        '<div class="fl"><label>GitHub URL</label><input class="fi" id="np-github" value="'+v('github')+'" placeholder="https://github.com/..." type="text"></div>'+
      '</div>'+
      '<div class="fl"><label>Description</label><input class="fi" id="np-desc" value="'+v('desc')+'" placeholder="Short description..." type="text"></div>'+
      '<div class="pf-acts">'+
        '<button class="bsp" id="btn-do-proj" type="button">'+(ed?'Update':'Add')+' Project</button>'+
        (ed?'<button class="bcp" id="btn-cancel-proj" type="button">Cancel</button>':'')+
      '</div>';
    g('btn-do-proj').addEventListener('click', function(){
      var sl = (g('np-slug').value||'').trim().toLowerCase().replace(/[^a-z0-9]+/g,'-');
      var lb = (g('np-label').value||'').trim();
      if (!sl||!lb) { toast('Slug and name required','err'); return; }
      if (!ed && state.projects.find(function(p){return p.slug===sl;})) { toast('Slug already exists','err'); return; }
      var obj = {slug:ed?ed.slug:sl, label:lb, desc:(g('np-desc').value||'').trim(), status:g('np-status').value, type:(g('np-type').value||'').trim(), lang:(g('np-lang').value||'').trim(), github:(g('np-github').value||'').trim()||'#'};
      if (ed) { Object.assign(ed,obj); } else { state.projects.push(obj); }
      saveState(); renderProjSelect(); editingSlug=null; switchPMTab('list');
      toast((ed?'Updated: ':'Added: ')+lb, 'ok');
    });
    var cc = g('btn-cancel-proj');
    if (cc) cc.addEventListener('click', function(){ editingSlug=null; switchPMTab('list'); });
  }
}

function switchPMTab(tab) {
  pmTab = tab;
  document.querySelectorAll('.ptab').forEach(function(b){b.classList.toggle('on', b.dataset.ptab===tab);});
  renderPM();
}

/* ---- Boot admin ------------------------------------------- */
function boot() {
  loadState();
  renderProjSelect();
  renderList();
  setStatus(state.posts.length + ' posts -- changes save to browser storage');

  // Editor events
  g('btn-new').addEventListener('click', newPost);
  g('btn-save').addEventListener('click', savePost);
  g('btn-del').addEventListener('click', deletePost);
  g('btn-prev-tab').addEventListener('click', function(){ switchTab('col-prev'); });
  g('ed-title').addEventListener('input', updatePreview);
  g('ed-date').addEventListener('change', updatePreview);
  g('ed-proj').addEventListener('change', updatePreview);
  g('ed-md').addEventListener('input', updatePreview);

  // Topbar
  g('btn-proj').addEventListener('click', function(){
    editingSlug=null; switchPMTab('list'); g('pm-ov').classList.add('open');
  });
  g('btn-logout').addEventListener('click', function(){ clearAuth(); location.reload(); });

  // Keyboard save
  document.addEventListener('keydown', function(e){
    if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); savePost(); }
  });

  // Project modal
  g('btn-pm-close').addEventListener('click', function(){ g('pm-ov').classList.remove('open'); });
  g('pm-ov').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
  document.querySelectorAll('.ptab').forEach(function(btn){
    btn.addEventListener('click', function(){ switchPMTab(btn.dataset.ptab); });
  });

  // Mobile tabs
  document.querySelectorAll('.mt').forEach(function(btn){
    btn.addEventListener('click', function(){ switchTab(btn.dataset.col); });
  });

  // Save dialog
  g('sdlg-x').addEventListener('click', function(){ g('sdlg').classList.remove('open'); });
  g('sdlg').addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
  g('sdlg-copy').addEventListener('click', function(){
    navigator.clipboard.writeText(g('sdlg-ta').value).then(function(){toast('Copied','ok');});
  });

  // Publish button
  var pb = g('btn-publish');
  if (pb) pb.addEventListener('click', persistData);
}

/* ---- Entry point ------------------------------------------ */
g('pw-go').addEventListener('click', function() {
  var val = g('pw-in').value;
  if (val === PW) {
    g('pw-err').textContent = '';
    setAuth();
    g('pw').style.display = 'none';
    g('shell').style.display = 'flex';
    boot();
  } else {
    g('pw-err').textContent = 'Incorrect password.';
    g('pw-in').style.borderColor = '#c0392b';
    setTimeout(function(){ g('pw-in').style.borderColor=''; }, 900);
    g('pw-in').select();
  }
});

g('pw-in').addEventListener('keydown', function(e){
  if (e.key === 'Enter') g('pw-go').click();
});

// Auto-login if already authed this session
if (isAuth()) {
  g('pw').style.display = 'none';
  g('shell').style.display = 'flex';
  boot();
}

})();
</script>

})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Free resources for EO developers — pixel art tools, tilesets, documentation, and project files.">
  <title>Resources — Ghoul's Grimoire</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div id="wrapper">

  <div id="header">
    <span id="site-title"><a href="index.html">Ghoul's Grimoire</a></span>
    <div id="site-tagline">Development Blog &mdash; EO Community Projects</div>
  </div>

  <nav id="nav" role="navigation" aria-label="Main navigation">
    <div id="nav-inner">
      <div class="nav-item"><a href="index.html" class="nav-link">Home</a></div>
      <div class="nav-item">
        <a href="projects/index.html" class="nav-link" data-section="projects">Projects <span class="caret">&#9660;</span></a>
        <div class="nav-dropdown" id="nav-projects-dropdown"></div>
      </div>
      <div class="nav-item"><a href="about.html"     class="nav-link">About Me</a></div>
      <div class="nav-item"><a href="resources.html" class="nav-link">Resources</a></div>
      <button id="nav-hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div id="mobile-menu" role="dialog">
    <a href="index.html">Home</a>
    <div class="mobile-section-label">Projects</div>
    <div id="mobile-projects-links"></div>
    <a href="about.html">About Me</a>
    <a href="resources.html">Resources</a>
  </div>

  <div id="main">
    <div class="panel">
      <div class="res-filter-bar" id="category-panel">
        <!-- populated by JS -->
      </div>
      <div id="resource-list">
        <!-- populated by JS -->
      </div>
    </div>
  </div>

  <div id="footer">
    <span>&copy; 2026 Ghoul's Grimoire</span>
    <nav class="footer-links">
      <a href="index.html">Home</a>
      <a href="projects/index.html">Projects</a>
      <a href="about.html">About</a>
    </nav>
  </div>

</div>
<script src="js/projects-data.js"></script>
<script src="js/resources.js"></script>
<script src="js/nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  /* Build nav */
  var projects = window.PROJECTS || [];
  var dd = document.getElementById('nav-projects-dropdown');
  var ml = document.getElementById('mobile-projects-links');
  if (dd) dd.innerHTML = projects.map(function(p){
    return '<a href="projects/' + p.slug + '.html">' + p.label + '</a>';
  }).join('');
  if (ml) ml.innerHTML = projects.map(function(p){
    return '<a href="projects/' + p.slug + '.html" class="indent">' + p.label + '</a>';
  }).join('');

  /* Resources */
  var catPanel = document.getElementById('category-panel');
  var resList  = document.getElementById('resource-list');
  if (!catPanel || !resList) return;

  var active = 'all';

  (window.RESOURCE_CATEGORIES || []).forEach(function (cat) {
    var count = cat.slug === 'all' ? window.RESOURCES.length
      : window.RESOURCES.filter(function(r){ return r.category === cat.slug; }).length;
    var btn = document.createElement('button');
    btn.className    = 'category-btn' + (cat.slug === 'all' ? ' active' : '');
    btn.dataset.slug = cat.slug;
    btn.innerHTML    = cat.label + '<span class="cat-count">' + count + '</span>';
    btn.addEventListener('click', function () {
      document.querySelectorAll('.category-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      active = cat.slug;
      render(cat.slug);
    });
    catPanel.appendChild(btn);
  });

  function render(slug) {
    var items = slug === 'all' ? window.RESOURCES
      : window.RESOURCES.filter(function(r){ return r.category === slug; });
    resList.innerHTML = items.map(window.renderResourceRow).join('');
  }

  render('all');
});
</script>
</body>
</html>
